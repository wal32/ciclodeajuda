<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Ciclo de Ajuda Mútua| Sistema de Doações</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #0f172a;
    color: #ffffff;
    line-height: 1.5;
    padding: 1rem;
  }

  .container {
    max-width: 650px;
    margin: 0 auto;
    background: rgba(15, 23, 42, 0.9);
    border-radius: 1.5rem;
    padding: 1.5rem;
    box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
    backdrop-filter: blur(2px);
  }

  h1, h2, h3, h4, p, span, div, label, a, button, input, textarea, select, .card, .card * {
    color: #ffffff !important;
  }

  input, button, textarea, select {
    background-color: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 1rem;
    outline: none;
    width: 100%;
    margin: 8px 0;
    color: #ffffff !important;
  }

  input::placeholder, textarea::placeholder {
    color: #cbd5e1 !important;
  }

  input:focus, button:focus, textarea:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 2px rgba(34,197,94,0.3);
    background-color: #0f172a;
  }

  button {
    background: #22c55e;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #16a34a;
    transform: scale(0.98);
  }

  button.secondary {
    background: #334155;
  }
  button.secondary:hover {
    background: #475569;
  }

  .card {
    background: #1e293b;
    border-radius: 20px;
    padding: 1rem;
    margin: 0.75rem 0;
    border-left: 4px solid #22c55e;
    word-break: break-word;
  }

  .hidden {
    display: none;
  }

  .flex-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 15px 0;
  }

  .info-link {
    background: #0f172a;
    padding: 12px;
    border-radius: 16px;
    margin-top: 20px;
    text-align: center;
    font-size: 0.9rem;
    border: 1px solid #22c55e40;
  }

  .ref-link-box, .pix-copy-box {
    background: #0f172a;
    border-radius: 14px;
    padding: 10px;
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .ref-link-box input, .pix-copy-box input {
    flex: 1;
    margin: 0;
    background: #1e293b;
    font-size: 0.8rem;
  }
  .ref-link-box button, .pix-copy-box button {
    width: auto;
    padding: 8px 12px;
    margin: 0;
  }

  .badge {
    background: #22c55e20;
    border-radius: 30px;
    padding: 4px 12px;
    font-size: 0.75rem;
    display: inline-block;
    margin-left: 8px;
  }

  .pix-mini {
    font-size: 0.8rem;
    font-family: monospace;
    background: #0f172a;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 6px;
  }

  hr {
    border-color: #334155;
    margin: 1rem 0;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="container" id="login">
  <h2>✨ Ciclo de Ajuda</h2>
  <input type="text" id="loginNome" placeholder="Seu nome completo" autocomplete="off">
  <input type="password" id="loginSenha" placeholder="Senha">
  <button onclick="logarUsuario()">Entrar</button>
  <div class="flex-buttons">
    <button class="secondary" onclick="mostrarCadastro()">📝 Cadastrar</button>
    <button class="secondary" onclick="acessoAdmin()">🔐 Admin</button>
  </div>
  <div class="info-link">
    🌐 Sistema de indicação individual — cada membro tem seu próprio link
  </div>
</div>

<!-- CADASTRO -->
<div class="container hidden" id="cadastro">
  <h2>📋 Novo participante</h2>
  <div id="msgIndicacao" style="background:#1e293b; padding: 10px; border-radius: 14px; margin-bottom: 10px;"></div>
  <input type="text" id="nome" placeholder="Nome completo">
  <input type="text" id="pix" placeholder="Chave Pix (email/telefone/cpf)">
  <input type="text" id="whatsapp" placeholder="WhatsApp com DDD">
  <input type="password" id="senha" placeholder="Crie uma senha">
  <button onclick="cadastrarUsuario()">Cadastrar</button>
  <button class="secondary" onclick="voltarLogin()">Voltar</button>
</div>

<!-- PAINEL DO PARTICIPANTE (COM COMPROVANTE) -->
<div class="container hidden" id="dashboard">
  <h2>🤝 Sua área colaborativa</h2>
  <div id="usuarioInfo"></div>
  
  <h3>💰 Sua chave Pix</h3>
  <div class="pix-copy-box">
    <input type="text" id="minhaChavePix" readonly onclick="this.select()">
    <button onclick="copiarPix()">📋 Copiar Pix</button>
  </div>

  <h3>🔗 Seu link de indicação</h3>
  <div class="ref-link-box">
    <input type="text" id="meuLinkRef" readonly onclick="this.select()">
    <button onclick="copiarLink()">📋 Copiar Link</button>
  </div>
  <button onclick="compartilharWhatsApp()">📲 Compartilhar no WhatsApp</button>
  
  <!-- COMPROVANTE INDIVIDUAL REINSERIDO -->
  <h3>📎 Anexar comprovante de contribuição</h3>
  <input type="file" id="comprovante" accept="image/*,application/pdf">
  <button onclick="uploadComprovante()">Enviar comprovante</button>

  <h3>👥 Participantes do ciclo (com Pix)</h3>
  <div id="lista"></div>
  
  <button class="secondary" onclick="logoutSistema()" style="margin-top: 25px;">🚪 Sair</button>
</div>

<!-- ADMIN -->
<div class="container hidden" id="adminPanel">
  <h2>⚙️ Gestão + Indicações</h2>
  <div id="adminLista"></div>
  <button class="secondary" onclick="sairAdmin()">◀ Voltar ao login</button>
</div>

<script>
  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
  let usuarioLogado = null;
  let refParam = null;

  const urlParams = new URLSearchParams(window.location.search);
  const codigoIndicacaoURL = urlParams.get('ref');
  if (codigoIndicacaoURL) {
    refParam = codigoIndicacaoURL;
    sessionStorage.setItem('refIndicacao', refParam);
  } else {
    refParam = sessionStorage.getItem('refIndicacao');
  }

  function gerarCodigoUnico(nome) {
    const base = nome.toLowerCase().replace(/\s/g, '') + Date.now() + Math.random().toString(36).substring(2, 6);
    return btoa(base).replace(/=/g, '').substring(0, 14);
  }

  function salvarUsuarios() {
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function contarIndicacoes(codigoReferencia) {
    return usuarios.filter(u => u.indicadoPorCodigo === codigoReferencia).length;
  }

  // Lista de participantes com Pix
  function atualizarListaParticipantes() {
    const listaDiv = document.getElementById("lista");
    if (!listaDiv) return;
    listaDiv.innerHTML = "";
    if (usuarios.length === 0) {
      listaDiv.innerHTML = `<div class="card">Nenhum participante cadastrado ainda.</div>`;
      return;
    }
    usuarios.forEach(u => {
      let statusTexto = "";
      if (u.status === "aprovado") statusTexto = "✅ Aprovado";
      else if (u.status === "reprovado") statusTexto = "❌ Reprovado";
      else statusTexto = "⏳ Pendente";
      const pixFormatado = u.pix ? `<div class="pix-mini">💰 Pix: ${escapeHtml(u.pix)}</div>` : '<div class="pix-mini">💰 Pix: não informado</div>';
      listaDiv.innerHTML += `
        <div class="card">
          <strong>${escapeHtml(u.nome)}</strong><br>
          Status: ${statusTexto}
          ${pixFormatado}
        </div>`;
    });
  }

  function carregarDashboardCompleto() {
    if (!usuarioLogado) return;
    const infoDiv = document.getElementById("usuarioInfo");
    const referralCount = contarIndicacoes(usuarioLogado.codigo);
    infoDiv.innerHTML = `
      <div class="card">
        <strong>👤 ${escapeHtml(usuarioLogado.nome)}</strong><br>
        💰 Pix: ${escapeHtml(usuarioLogado.pix || 'não informado')}<br>
        📱 WhatsApp: ${escapeHtml(usuarioLogado.whatsapp || 'não informado')}<br>
        🟢 Status: ${usuarioLogado.status === "aprovado" ? "Aprovado ✅" : (usuarioLogado.status === "reprovado" ? "Reprovado ❌" : "Pendente ⏳")}<br>
        🎯 Indicações: <strong>${referralCount}</strong> pessoa(s) convidada(s)<br>
        📎 Comprovante: ${usuarioLogado.comprovante ? escapeHtml(usuarioLogado.comprovante) : 'nenhum anexado'}
      </div>`;
    
    const pixInput = document.getElementById("minhaChavePix");
    if (pixInput) pixInput.value = usuarioLogado.pix || "Chave não informada";
    
    const linkCompleto = `https://wal32.github.io/ciclodeajuda/?ref=${usuarioLogado.codigo}`;
    const linkInput = document.getElementById("meuLinkRef");
    if (linkInput) linkInput.value = linkCompleto;
    
    atualizarListaParticipantes();
  }

  // LOGIN
  function logarUsuario() {
    const nomeInput = document.getElementById("loginNome").value.trim();
    const senhaInput = document.getElementById("loginSenha").value;
    if (!nomeInput || !senhaInput) {
      alert("Preencha nome e senha.");
      return;
    }
    const encontrado = usuarios.find(u => u.nome === nomeInput && u.senha === senhaInput);
    if (encontrado) {
      usuarioLogado = encontrado;
      document.getElementById("login").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      carregarDashboardCompleto();
    } else {
      alert("❌ Nome ou senha incorretos.");
    }
  }

  // CADASTRO com Pix obrigatório
  function mostrarCadastro() {
    const msgDiv = document.getElementById("msgIndicacao");
    if (refParam) {
      const indicador = usuarios.find(u => u.codigo === refParam);
      if (indicador) {
        msgDiv.innerHTML = `<span style="color:#86efac;">✨ Você foi convidado por ${escapeHtml(indicador.nome)}! Ao se cadastrar, ele ganhará uma indicação.</span>`;
      } else {
        msgDiv.innerHTML = `<span>🔗 Link de indicação recebido, mas o convidante não está mais ativo.</span>`;
      }
    } else {
      msgDiv.innerHTML = `<span>📢 Cadastre-se normalmente. Se alguém te indicou, use o link especial dele.</span>`;
    }
    document.getElementById("login").classList.add("hidden");
    document.getElementById("cadastro").classList.remove("hidden");
  }

  function cadastrarUsuario() {
    if (usuarios.length >= 10) {
      alert("Limite máximo de 10 participantes atingido!");
      return;
    }
    const nomeEl = document.getElementById("nome");
    const pixEl = document.getElementById("pix");
    const whatsEl = document.getElementById("whatsapp");
    const senhaEl = document.getElementById("senha");

    const nome = nomeEl.value.trim();
    const pix = pixEl.value.trim();
    const whats = whatsEl.value.trim();
    const senha = senhaEl.value;

    if (!nome || !pix || !whats || !senha) {
      alert("Todos os campos são obrigatórios, incluindo a chave Pix.");
      return;
    }
    if (usuarios.some(u => u.nome === nome)) {
      alert("Este nome já está cadastrado.");
      return;
    }

    const novoCodigo = gerarCodigoUnico(nome);
    let indicadoPorCodigo = null;
    let indicadoPorNome = null;

    let codigoIndicador = refParam || sessionStorage.getItem('refIndicacao');
    if (codigoIndicador) {
      const indicador = usuarios.find(u => u.codigo === codigoIndicador);
      if (indicador) {
        indicadoPorCodigo = indicador.codigo;
        indicadoPorNome = indicador.nome;
      }
    }

    const novoUsuario = {
      nome: nome,
      pix: pix,
      whatsapp: whats,
      senha: senha,
      status: "pendente",
      comprovante: "",   // inicia sem comprovante
      codigo: novoCodigo,
      indicadoPorCodigo: indicadoPorCodigo,
      indicadoPorNome: indicadoPorNome
    };
    usuarios.push(novoUsuario);
    salvarUsuarios();
    
    alert(`✅ Cadastro realizado! ${indicadoPorNome ? `Você foi indicado por ${indicadoPorNome}.` : 'Bem-vindo ao ciclo.'}`);
    sessionStorage.removeItem('refIndicacao');
    refParam = null;
    voltarLogin();
    nomeEl.value = "";
    pixEl.value = "";
    whatsEl.value = "";
    senhaEl.value = "";
  }

  function voltarLogin() {
    document.getElementById("cadastro").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
  }

  // FUNÇÃO DE UPLOAD DO COMPROVANTE (individual)
  function uploadComprovante() {
    if (!usuarioLogado) return;
    const fileInput = document.getElementById("comprovante");
    if (!fileInput.files.length) {
      alert("Selecione um arquivo.");
      return;
    }
    const arquivo = fileInput.files[0];
    // Armazena apenas o nome do arquivo (simulação, pode ser adaptado para base64 se desejar)
    usuarioLogado.comprovante = arquivo.name;
    const index = usuarios.findIndex(u => u.codigo === usuarioLogado.codigo);
    if (index !== -1) {
      usuarios[index].comprovante = arquivo.name;
      salvarUsuarios();
      alert(`Comprovante "${arquivo.name}" enviado com sucesso!`);
      // Atualiza exibição do comprovante no card
      carregarDashboardCompleto();
    } else {
      alert("Erro ao salvar comprovante.");
    }
    fileInput.value = "";
  }

  function copiarPix() {
    const pixInput = document.getElementById("minhaChavePix");
    if (pixInput && pixInput.value && pixInput.value !== "Chave não informada") {
      navigator.clipboard.writeText(pixInput.value);
      alert("Chave Pix copiada!");
    } else {
      alert("Nenhuma chave Pix cadastrada.");
    }
  }

  function copiarLink() {
    const linkInput = document.getElementById("meuLinkRef");
    if (linkInput && linkInput.value) {
      navigator.clipboard.writeText(linkInput.value);
      alert("Link copiado!");
    }
  }

  function compartilharWhatsApp() {
    if (!usuarioLogado) return;
    const linkPersonal = `https://wal32.github.io/ciclodeajuda/?ref=${usuarioLogado.codigo}`;
    const mensagem = `🌟 Participe do ciclo de ajuda mútua comigo! Use meu link de indicação: ${linkPersonal}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(mensagem)}`, '_blank');
  }

  function logoutSistema() {
    usuarioLogado = null;
    document.getElementById("loginNome").value = "";
    document.getElementById("loginSenha").value = "";
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
  }

  // ADMIN
  function acessoAdmin() {
    const senhaAdmin = prompt("Senha de administrador:");
    if (senhaAdmin === "123456") {
      document.getElementById("login").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");
      renderAdminPanel();
    } else if (senhaAdmin !== null) alert("Senha incorreta.");
  }

  function renderAdminPanel() {
    const adminDiv = document.getElementById("adminLista");
    if (!adminDiv) return;
    if (usuarios.length === 0) {
      adminDiv.innerHTML = `<div class="card">Nenhum usuário cadastrado.</div>`;
      return;
    }
    let html = "";
    usuarios.forEach((user, idx) => {
      const qtdIndicacoes = contarIndicacoes(user.codigo);
      html += `
        <div class="card">
          <strong>${escapeHtml(user.nome)}</strong> 
          <span class="badge">código: ${user.codigo}</span><br>
          📧 Pix: ${escapeHtml(user.pix)}<br>
          📞 WhatsApp: ${escapeHtml(user.whatsapp)}<br>
          🏷 Status: <strong>${user.status}</strong><br>
          🎯 Indicações: <strong>${qtdIndicacoes}</strong> pessoas<br>
          👥 Indicado por: ${user.indicadoPorNome ? escapeHtml(user.indicadoPorNome) : '—'}<br>
          📎 Comprovante: ${user.comprovante ? escapeHtml(user.comprovante) : 'nenhum'}<br>
          <div class="flex-buttons" style="margin-top: 10px;">
            <button onclick="aprovarParticipante(${idx})">✅ Aprovar</button>
            <button onclick="reprovarParticipante(${idx})">⚠️ Reprovar</button>
            <button onclick="excluirParticipante(${idx})">🗑 Excluir</button>
          </div>
        </div>`;
    });
    adminDiv.innerHTML = html;
  }

  function aprovarParticipante(indice) {
    if (indice >= 0 && indice < usuarios.length) {
      usuarios[indice].status = "aprovado";
      salvarUsuarios();
      renderAdminPanel();
      if (usuarioLogado && usuarioLogado.codigo === usuarios[indice].codigo) {
        usuarioLogado.status = "aprovado";
        carregarDashboardCompleto();
      }
    }
  }

  function reprovarParticipante(indice) {
    if (indice >= 0 && indice < usuarios.length) {
      usuarios[indice].status = "reprovado";
      salvarUsuarios();
      renderAdminPanel();
      if (usuarioLogado && usuarioLogado.codigo === usuarios[indice].codigo) {
        usuarioLogado.status = "reprovado";
        carregarDashboardCompleto();
      }
    }
  }

  function excluirParticipante(indice) {
    if (indice >= 0 && indice < usuarios.length) {
      const nomeExcluido = usuarios[indice].nome;
      if (confirm(`Excluir ${nomeExcluido} permanentemente?`)) {
        usuarios.splice(indice, 1);
        salvarUsuarios();
        renderAdminPanel();
        if (usuarioLogado && usuarioLogado.nome === nomeExcluido) {
          logoutSistema();
        } else if (usuarioLogado) {
          atualizarListaParticipantes();
        }
      }
    }
  }

  function sairAdmin() {
    document.getElementById("adminPanel").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    usuarioLogado = null;
  }

  // Migração
  function migrarBanco() {
    let altered = false;
    for (let i = 0; i < usuarios.length; i++) {
      if (!usuarios[i].codigo) {
        usuarios[i].codigo = gerarCodigoUnico(usuarios[i].nome);
        altered = true;
      }
      if (usuarios[i].indicadoPorCodigo === undefined) {
        usuarios[i].indicadoPorCodigo = null;
        usuarios[i].indicadoPorNome = null;
        altered = true;
      }
      if (!usuarios[i].status) usuarios[i].status = "pendente";
      if (usuarios[i].comprovante === undefined) {
        usuarios[i].comprovante = "";
        altered = true;
      }
      if (!usuarios[i].pix) usuarios[i].pix = "";
    }
    if (altered) salvarUsuarios();
  }
  migrarBanco();

  // Inicialização
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("cadastro").classList.add("hidden");
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("adminPanel").classList.add("hidden");

  // Expor funções globais
  window.logarUsuario = logarUsuario;
  window.mostrarCadastro = mostrarCadastro;
  window.cadastrarUsuario = cadastrarUsuario;
  window.voltarLogin = voltarLogin;
  window.uploadComprovante = uploadComprovante;
  window.compartilharWhatsApp = compartilharWhatsApp;
  window.logoutSistema = logoutSistema;
  window.acessoAdmin = acessoAdmin;
  window.aprovarParticipante = aprovarParticipante;
  window.reprovarParticipante = reprovarParticipante;
  window.excluirParticipante = excluirParticipante;
  window.sairAdmin = sairAdmin;
  window.copiarLink = copiarLink;
  window.copiarPix = copiarPix;
</script>
</body>
</html>
