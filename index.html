<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ciclo de Ajuda Mútua – Sistema de Doações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .mockup-card {
            max-width: 540px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .mockup-card:hover {
            transform: scale(1.01);
        }

        .hero {
            background: linear-gradient(135deg, #2b7a4b, #1e5a3a);
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.4rem;
        }

        .hero h1 span {
            font-weight: 300;
            font-size: 1.2rem;
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
            margin-left: 8px;
        }

        .hero .sub {
            font-size: 0.9rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .hero .sub::before, .hero .sub::after {
            content: "❤️";
            font-size: 1rem;
            opacity: 0.8;
        }

        /* conteúdo */
        .form-container {
            padding: 2rem 1.8rem 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e2f;
            margin-bottom: 0.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 2rem;
            background: #fefefe;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #2b7a4b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(43, 122, 75, 0.2);
        }

        .btn-entrar {
            width: 100%;
            background: linear-gradient(100deg, #2b7a4b, #1e5a3a);
            border: none;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1.2rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        .btn-entrar:hover {
            background: linear-gradient(100deg, #1f6340, #164a2e);
            transform: translateY(-2px);
        }

        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 0rem;
            margin-bottom: 1.8rem;
        }

        .links a {
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 2rem;
            transition: 0.1s;
        }

        .cadastrar {
            background: #f1f5f9;
            color: #1e5a3a;
        }

        .admin {
            background: transparent;
            color: #5b6e5c;
            border: 1px solid #d4dcd0;
        }

        .links a:hover {
            background: #e6f0ea;
        }

        /* Banner sistema de posições (igual ao original) */
        .indique-banner {
            background: #fef7e0;
            margin: 0 1.5rem 1.5rem 1.5rem;
            padding: 1rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            border: 1px solid #ffe5a3;
            font-weight: 600;
            color: #b46f0b;
        }

        .indique-banner span {
            background: #ffd966;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 1.2rem;
            color: #4a2e00;
        }

        /* Seção de cadastro completo (novo) */
        .cadastro-section {
            margin: 0 1.5rem 1.8rem 1.5rem;
            background: #F9FCF7;
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #e2efdf;
        }

        .cadastro-title {
            font-weight: 700;
            color: #1e5a3a;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cadastrar-novo {
            width: 100%;
            background: linear-gradient(100deg, #ffb347, #ff9f2c);
            border: none;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            color: #2d2b26;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .btn-cadastrar-novo:hover {
            background: linear-gradient(100deg, #ffa31a, #ff8c00);
            transform: translateY(-2px);
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #8c9a8c;
            padding: 0.8rem 1rem 1.5rem;
            border-top: 1px solid #ececec;
            margin-top: 0.2rem;
        }

        .badge-mock {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 27px;
            color: white;
            font-family: monospace;
            pointer-events: none;
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
            .form-container {
                padding: 1.5rem;
            }
            .indique-banner, .cadastro-section {
                margin-left: 1rem;
                margin-right: 1rem;
            }
        }
    </style>
</head>
<body>
<div style="position: relative;">
    <div class="mockup-card">
        <div class="hero">
            <h1>Ciclo de Ajuda Mútua <span>❤️</span></h1>
            <div class="sub">Sistema de Doações Colaborativo</div>
        </div>

        <div class="form-container">
            <!-- Login: WhatsApp + Senha (substituiu o Nome completo) -->
            <div class="input-group">
                <label>WhatsApp (login)</label>
                <input type="tel" placeholder="(11) 99999-9999">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••">
            </div>
            <button class="btn-entrar">Entrar</button>

            <div class="links">
                <a href="#" class="cadastrar">📝 Cadastrar</a>
                <a href="#" class="admin">🔐 Admin</a>
            </div>
        </div>

        <!-- Banner de sistema de posições (igual ao original) -->
        <div class="indique-banner">
            💰 Sistema de posições: indique e ganhe
            <span>R$20</span>
            a cada nova entrada na sua rede.
        </div>

        <!-- NOVO: Cadastro completo do participante -->
        <div class="cadastro-section">
            <div class="cadastro-title">
                <i class="fa-regular fa-id-card"></i> Novo participante – cadastro completo
            </div>
            <div class="input-group" style="margin-bottom: 1rem;">
                <label>Nome completo</label>
                <input type="text" placeholder="Ex: Ana Beatriz Souza">
            </div>
            <div class="input-group" style="margin-bottom: 1rem;">
                <label>E-mail</label>
                <input type="email" placeholder="ana@email.com">
            </div>
            <div class="input-group" style="margin-bottom: 1rem;">
                <label>WhatsApp (com DDD)</label>
                <input type="tel" placeholder="(11) 98888-7777">
            </div>
            <div class="input-group" style="margin-bottom: 1rem;">
                <label>Criar senha</label>
                <input type="password" placeholder="mínimo 6 caracteres">
            </div>
            <div class="input-group" style="margin-bottom: 1rem;">
                <label>Confirmar senha</label>
                <input type="password" placeholder="digite novamente">
            </div>
            <button class="btn-cadastrar-novo">✅ Cadastrar e começar a doar</button>
        </div>

        <div class="footer-note">
            🌱 Doações constroem um ciclo de confiança • Participe
        </div>
    </div>
   


</body>
</html>
